<!DOCTYPE html>
<html lang="es">

<head>
    <!----------------------- Primary Meta-tags ----------------------->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Clau Food - Menú completo con perros, salchipapas, hamburguesas, asados y pizzas.">
    <title>Clau Food - Menú Completo</title>

    <!----------------------- Organization Schema ----------------------->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Clau Food",
      "url": "https://claufood.com",
      "description": "Perros, salchipapas, hamburguesas, asados y pizzas con antojo real.",
      "telephone": "+573244840556",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Bogotá",
        "addressCountry": "CO"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "telephone": "+573244840556"
      }
    }
    </script>

    <!----------------------- Open Graph / Facebook / WhatsApp ----------------------->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://claufood.com/menu.html">
    <meta property="og:title" content="Menú Completo - Clau Food">
    <meta property="og:description" content="Explora nuestra variedad de perros, salchipapas y más. ¡Haz tu pedido ahora!">
    <meta property="og:image" content="https://claufood.com/assets/productos/temporal.jpg">

    <!----------------------- Twitter / X ----------------------->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Menú Clau Food">
    <meta name="twitter:description" content="¿Qué se te antoja hoy?">
    <meta name="twitter:image" content="https://claufood.com/assets/productos/temporal.jpg">

    <!----------------------- Fav Icon ----------------------->
    <link rel="icon" href="./assets/logos/temporal.jpg">

    <!----------------------- CSS Links ----------------------->
    <link rel="stylesheet" href="./styles/index.css">

    <!----------------------- JavaScript Links ----------------------->
    <script type="module" src="./assets/bundle.js" defer></script>
</head>

<body>
    <!----------------------- Header ----------------------->
    <header class="header">
        <div class="header__logo-container">
            <img src="./assets/logos/temporal.jpg" alt="Clau Food Logo" class="header__logo">
            <p class="header__text">Clau Food</p>
        </div>
        <button class="header__burger" aria-controls="header-overlay" aria-expanded="false" aria-label="Abrir menú">
            <span class="header__burger-bar"></span>
            <span class="header__burger-bar"></span>
            <span class="header__burger-bar"></span>
        </button>
        <ul class="header__options">
            <li class="header__option"><a href="./index.html" class="header__anchor">Inicio</a></li>
            <li class="header__option"><a href="#menu" class="header__anchor">Menú</a></li>
            <li class="header__option"><a href="#contacto" class="header__anchor">Contacto</a></li>
        </ul>
        <nav id="header-overlay" class="header__overlay" aria-hidden="true">
            <ul class="header__options header__options--mobile">
                <li class="header__option"><a href="./index.html" class="header__anchor">Inicio</a></li>
                <li class="header__option"><a href="#menu" class="header__anchor">Menú</a></li>
                <li class="header__option"><a href="#contacto" class="header__anchor">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <!----------------------- Main ----------------------->
    <main class="main">
        <section class="menu" id="menu">
            <h1 class="menu__title">Menú completo</h1>

            <div class="menu__controls" role="group" aria-label="Filtrar menú por categoría">
                <button class="menu__filter-button menu__filter-button--active" type="button" data-menu-filter="all"
                    aria-pressed="true">Todos</button>
                <button class="menu__filter-button" type="button" data-menu-filter="perros"
                    aria-pressed="false">Perros</button>
                <button class="menu__filter-button" type="button" data-menu-filter="salchipapas"
                    aria-pressed="false">Salchipapas</button>
                <button class="menu__filter-button" type="button" data-menu-filter="hamburguesas"
                    aria-pressed="false">Hamburguesas</button>
                <button class="menu__filter-button" type="button" data-menu-filter="asados"
                    aria-pressed="false">Asados</button>
                <button class="menu__filter-button" type="button" data-menu-filter="pizzas"
                    aria-pressed="false">Pizzas</button>
            </div>

            <!----------------------- Header Section ----------------------->
            <ul class="menu__list"></ul>

            <!----------------------- Pagination Controls ----------------------->
            <nav class="pagination" aria-label="Paginación del menú" style="display: none;">
                <button class="pagination__prev" type="button" aria-label="Página anterior">Anterior</button>
                <span class="pagination__info">Página 1 de 1</span>
                <button class="pagination__next" type="button" aria-label="Página siguiente">Siguiente</button>
            </nav>

            <!----------------------- Menu Footer Section ----------------------->
            <div class="menu__footer">
                <a href="./index.html" class="menu__more">Volver al inicio</a>
            </div>
        </section>
        <section class="contacto" id="contacto">
            <div class="contacto__rapido">
                <p class="contacto__claim">¿Listo para pedir?</p>
                <a href="https://wa.me/+573244840556?text=Hola,%20soy%20[TuNombre].%20%20Dirección:%20[Calle%20123].%20%20Medios%20de%20pago:%20Efectivo%20(con%20vuelto),%20o%20Nequi."
                    class="contacto__cta" target="_blank"><img src="./assets/icons/whatsapp-svgrepo-com.svg"
                        alt="whatsapp-icon"></a>
            </div>
            <ul class="contacto__info">
                <li class="contacto__item">
                    <a href="tel:+573244840556" class="contacto__whatsapp">+57 324 4840556</a>
                </li>
                <li class="contacto__item">
                    <a href="#" class="contacto__instagram">Instagram</a>
                </li>
                <li class="contacto__item">
                    <a href="#" class="contacto__email">Email</a>
                </li>
                <li class="contacto__item">
                    <a href="#" class="contacto__direccion">Dirección</a>
                </li>
            </ul>
        </section>
    </main>

    <!----------------------- Footer Section ----------------------->
    <footer class="footer">
        <p>&copy; 2026 Clau Food. Todos los derechos reservados.</p>
    </footer>

</body>

</html>
